name: Publish containers

on:
  push:
    branches:
      - main
      - dev
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/publish-containers.yml

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      backend_version: ${{ steps.versions.outputs.backend_version }}
      frontend_version: ${{ steps.versions.outputs.frontend_version }}
      image_prefix: ${{ steps.images.outputs.image_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" =~ ^0+$ ]]; then
            if git rev-parse "${after}^" >/dev/null 2>&1; then
              before="${after}^"
            else
              before=""
            fi
          fi

          if [[ -n "$before" ]]; then
            changed_files="$(git diff --name-only "$before" "$after")"
          else
            changed_files="$(git ls-files)"
          fi

          if grep -q '^backend/' <<< "$changed_files"; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -q '^frontend/' <<< "$changed_files"; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read package versions
        id: versions
        shell: bash
        run: |
          echo "backend_version=$(node -p 'require("./backend/package.json").version')" >> "$GITHUB_OUTPUT"
          echo "frontend_version=$(node -p 'require("./frontend/package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "image_prefix=ghcr.io/${repository}" >> "$GITHUB_OUTPUT"

  publish-backend:
    name: Publish backend
    needs: changes
    if: needs.changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ needs.changes.outputs.image_prefix }}-backend:dev-${{ needs.changes.outputs.backend_version }}

  publish-frontend:
    name: Publish frontend
    needs: changes
    if: needs.changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ needs.changes.outputs.image_prefix }}-frontend:dev-${{ needs.changes.outputs.frontend_version }}
