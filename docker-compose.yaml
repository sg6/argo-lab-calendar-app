services:
  backend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "9100:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://calendar:calendar@postgres:5432/calendar?schema=public
      JWT_SECRET: local-calendar-secret
      FRONTEND_ORIGIN: http://localhost:5173
      PORT: 3000
    command: sh -c "npm install && npx prisma db push && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:9100
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
      POSTGRES_DB: calendar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar -d calendar"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "9180:8080"
    depends_on:
      - postgres

volumes:
  backend_node_modules:
  frontend_node_modules:
  postgres_data:
