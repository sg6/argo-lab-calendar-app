apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/sg6/argo-lab-calendar-app
      revision: HEAD
      directories:
      - path: devops/k8s_manifests/app-of-apps/appset-apps/*
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
    spec:
      destination:
        namespace: '{{path.basename}}'
        server: https://kubernetes.default.svc
      project: default
      source:
        path: '{{path}}'
        repoURL: https://github.com/sg6/argo-lab-calendar-app.git
        targetRevision: HEAD
      syncPolicy:
        automated:
          enabled: true
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true   
      
